apiVersion: apps/v1
kind: Deployment
metadata:
  name: shortlink-rpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shortlink-rpc
  template:
    metadata:
      labels:
        app: shortlink-rpc
    spec:
      containers:
        - name: shortlink-rpc
          image: shortlink-server:latest
          args: ["/app/bin/shortlink-rpc", "-f", "/app/etc/shortlink.yaml"]
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: shortlink-rpc
spec:
  selector:
    app: shortlink-rpc
  ports:
    - port: 8081
      targetPort: 8081
