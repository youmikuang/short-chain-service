worker_processes auto;
events { worker_connections 1024; }

http {
    upstream shortlink_api {
        server shortlink-api:8888;
    }
    upstream admin_api {
        server admin-api:8889;
    }

    server {
        listen 80;

        # 短链跳转 + 开放 API
        location /r/        { proxy_pass http://shortlink_api; }
        location /api/      { proxy_pass http://shortlink_api; }

        # 管理后台 API + 静态托管
        location /admin/api/ { proxy_pass http://admin_api; }
        location /admin/     { proxy_pass http://admin_api; }

        # Vue3 官网
        location / {
            root /usr/share/nginx/html/web;
            try_files $uri $uri/ /index.html;
        }
    }
}
