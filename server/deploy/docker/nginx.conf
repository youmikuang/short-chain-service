worker_processes auto;
events { worker_connections 1024; }

http {
    upstream slink_api {
        server slink-api:8888;
    }
    upstream slink_jump {
        server slink-jump:8889;
    }
    upstream admin_api {
        server admin-api:8889;
    }

    server {
        listen 80;

        # 短链跳转（独立 jump 服务，可与 api 分开部署）
        location /r/        { proxy_pass http://slink_jump; }
        # 开放 API（api 服务）
        location /api/      { proxy_pass http://slink_api; }

        # 管理后台 API + 静态托管
        location /admin/api/ { proxy_pass http://admin_api; }
        location /admin/     { proxy_pass http://admin_api; }

        # Vue3 官网
        location / {
            root /usr/share/nginx/html/web;
            try_files $uri $uri/ /index.html;
        }
    }
}
