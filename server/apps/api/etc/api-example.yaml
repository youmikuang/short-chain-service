Name: shortlink-api
Host: 0.0.0.0
Port: 8888

Auth:
  AccessSecret: <jwt-access-secret>
  AccessExpire: 86400

Mysql:
  DataSource: root:root@tcp(127.0.0.1:3306)/short_chain?charset=utf8mb4

# API Key 校验中间件读取的 Redis Key 前缀（按 Key 限流亦可放此处）
RateLimit:
  Redis:
    Host: 127.0.0.1:6379
    Pass: ""
    DB: 0

# GitHub OAuth（用户体系纯 HTTP 接口使用）
Github:
  ClientID: <github-client-id>
  ClientSecret: <github-client-secret>
  RedirectURL: http://localhost:5173/auth/callback

# 直连短链核心 gRPC 服务（开发环境免去 Etcd 依赖；生产可切回 Etcd 服务发现）
Rpc:
  Target: 127.0.0.1:8081

# 短链对外域名（用于拼接完整短链 URL，如 https://s.gaoheng.top/r/CODE）
ShortDomain: http://localhost:8888

# 短链访问明细（驱动 /api/logs 与 /api/usage-trends）存放于 ClickHouse
ClickHouse:
  Host: 127.0.0.1
  Port: 8123
  Database: short_chain
  Username: default
  Password: ""
