Name: admin-api
Host: 0.0.0.0
Port: 8889

Auth:
  AccessSecret: <jwt-access-secret>
  AccessExpire: 86400

Mysql:
  DataSource: root:root@tcp(127.0.0.1:3306)/short_chain?charset=utf8mb4

BlacklistRedis:
  Host: 127.0.0.1:6379
  Pass: ""
  DB: 0

BlacklistRedisKey: short_chain:blacklist

# 直连短链核心 gRPC 服务（开发环境免去 Etcd 依赖；生产可切回 Etcd 服务发现）
Rpc:
  Target: 127.0.0.1:8081

# ClickHouse（rpc_logs 每日生成量统计用，原生协议端口 9000）
ClickHouse:
  Host: 127.0.0.1
  Port: 9000
  Database: short_chain
  Username: default
  Password: ""

# 短链对外域名（后台列表拼接完整短链地址用）
ShortDomain: s.gaoheng.top
