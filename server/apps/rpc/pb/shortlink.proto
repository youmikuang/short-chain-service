syntax = "proto3";

package pb;

option go_package = "server/apps/rpc/pb;pb";

// slink 短链核心服务（对内 gRPC，对外不暴露）
service slink {
  rpc Createslink(CreateslinkReq) returns (CreateslinkResp);
  rpc GetByCode(GetByCodeReq) returns (GetByCodeResp);
  rpc BatchCreate(BatchCreateReq) returns (BatchCreateResp);
  rpc Deleteslink(DeleteslinkReq) returns (DeleteslinkResp);
  rpc Resolve(ResolveReq) returns (ResolveResp); // 跳转解析（含黑名单校验）
}

message CreateslinkReq {
  string long_url = 1;
  int64  user_id  = 2;
  string api_key  = 3;
}
message CreateslinkResp {
  string code     = 1;
  string long_url = 2;
}

message GetByCodeReq { string code = 1; }
message GetByCodeResp {
  string code     = 1;
  string long_url = 2;
  int64  clicks   = 3;
  int32  status   = 4;
}

message BatchCreateReq {
  repeated string long_urls = 1;
  int64  user_id            = 2;
}
message BatchCreateResp { repeated CreateslinkResp items = 1; }

message DeleteslinkReq { string code = 1; int64 user_id = 2; }
message DeleteslinkResp { bool ok = 1; }

message ResolveReq { string code = 1; }
message ResolveResp {
  string long_url = 1;
  bool   blocked  = 2; // 命中域名黑名单
}
